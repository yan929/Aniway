name: Deploy Aniway to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      # --- Frontend Build ---
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
        # If your server expects the build in a specific backend folder:
        # cp -r build ../server/public # Adjust as needed

      # --- Backend Setup & Deployment ---
      - name: Install Backend Dependencies & Prepare for Deploy
        run: |
          cd backend
          npm install --omit=dev

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }} # This is for GitHub Actions runner to SSH into VPS
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "--- Setting up ASDF environment on VPS ---"
            ASDF_SCRIPT_PATH="$HOME/.asdf/asdf.sh"
            if [ -f "$ASDF_SCRIPT_PATH" ]; then
              echo "Sourcing ASDF from $ASDF_SCRIPT_PATH"
              . "$ASDF_SCRIPT_PATH"
              echo "Node version via asdf: $(node -v)"
              echo "NPM version via asdf: $(npm -v)"
              if command -v pm2 &> /dev/null; then
                echo "PM2 version: $(pm2 --version)"
              else
                echo "WARNING: pm2 command not found after ASDF setup. Ensure it's installed globally via npm with an asdf-managed Node version."
              fi
            else
              echo "ERROR: ASDF script not found at $ASDF_SCRIPT_PATH. Cannot set up Node.js environment."
              echo "Please ensure ASDF is installed correctly for the user '${{ secrets.VPS_USERNAME }}' and the path is correct."
              exit 1
            fi
            echo "--- ASDF setup complete ---"

            export PROJECT_DIR="/home/shibang/Code/group-project-team-rocket-webmasters"

            echo "Changing to project directory: $PROJECT_DIR"
            cd $PROJECT_DIR || { echo "ERROR: Failed to cd into $PROJECT_DIR"; exit 1; }

            echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
            echo "Checking out main branch..."
            git checkout main
            echo "Fetching latest changes from origin..."
            git fetch origin
            echo "Resetting main branch to origin/main..."
            git reset --hard origin/main

            echo "Creating/Updating backend .env file..."
            mkdir -p $PROJECT_DIR/backend
            echo "NODE_ENV=production" > $PROJECT_DIR/backend/.env
            echo "PORT=5050" >> $PROJECT_DIR/backend/.env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> $PROJECT_DIR/backend/.env
            echo "GOOGLE_API_HOST=${{ secrets.GOOGLE_API_HOST }}" >> $PROJECT_DIR/backend/.env
            echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> $PROJECT_DIR/backend/.env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> $PROJECT_DIR/backend/.env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> $PROJECT_DIR/backend/.env
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> $PROJECT_DIR/backend/.env
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> $PROJECT_DIR/backend/.env
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> $PROJECT_DIR/backend/.env
            echo "OTHER_ORIGINS=${{ secrets.OTHER_ORIGINS }}" >> $PROJECT_DIR/backend/.env

            echo "Creating/Updating frontend .env file..."
            mkdir -p $PROJECT_DIR/frontend
            echo "VITE_Maps_API_KEY=${{ secrets.VITE_Maps_API_KEY }}" > $PROJECT_DIR/frontend/.env
            echo "VITE_BACKEND_API=${{ secrets.VITE_BACKEND_API }}" >> $PROJECT_DIR/frontend/.env

            echo "Installing backend dependencies..."
            cd $PROJECT_DIR/backend || { echo "ERROR: Failed to cd into $PROJECT_DIR/backend"; exit 1; }
            npm install --omit=dev --verbose

            echo "Installing frontend dependencies and building..."
            cd $PROJECT_DIR/frontend || { echo "ERROR: Failed to cd into $PROJECT_DIR/frontend"; exit 1; }
            # For frontend build, you typically NEED devDependencies
            npm install --verbose 
            npm run build --verbose

            echo "Restarting application with PM2..."
            if command -v pm2 &> /dev/null
            then
                if pm2 describe aniway &> /dev/null; then
                  pm2 restart aniway
                else
                  pm2 start $PROJECT_DIR/backend/server.js --name aniway
                fi
                pm2 save
                echo "PM2 tasks completed."
            else
                echo "ERROR: PM2 command not found. Cannot start/restart application."
                exit 1
            fi
            echo "Deployment script finished successfully."
